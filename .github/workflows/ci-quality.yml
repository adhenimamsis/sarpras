name: CI Quality Gate

on:
  push:
  pull_request:

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Validate composer manifest
        run: composer validate --strict

      - name: Install backend dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application environment
        run: |
          cp .env.example .env
          php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite');"
          php artisan key:generate --ansi

      - name: Run database migration
        run: php artisan migrate --force --ansi

      - name: Run backend quality gate
        run: composer quality

      - name: Run operational doctor
        run: composer doctor

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend quality gate
        run: npm run quality
